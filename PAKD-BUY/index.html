<body>
<div id="root" style="height:100vh;display:flex;flex-direction:column;overflow:hidden;"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const ALLOYS  = ["A1050","A1052","A1060","A3003","A3003 CT","A3105","A5052","A5083","A6061","A6063"];
const TEMPERS = ["H14","H16","H18","H24","H32","H34","H111","O","T5","T6"];
const THICKS  = ["0.4","0.5","0.6","0.7","0.8","0.9","1.0","1.2","1.5","2.0","2.5","3.0","4.0","5.0","6.0"];
const WIDTHS  = ["600","800","1000","1200","1220","1250","1500","1524","2000"];
const LENGTHS = ["Coil","1000","1200","2000","2400","2500","3000","4000","6000","Custom"];

// ── COATING LOGIC ─────────────────────────────────────────────────────────────
// GSheet lưu: 1E (có phủ PE) và KP (không phủ NOPE)
// App hiển thị: toggle NOPE ↔ PE
// SKU key dùng giá trị GSheet: 1E / KP
// Hàm chuyển đổi GSheet → App internal value
const coatingFromGSheet = (val) => {
  if(!val) return 'KP';
  const v = String(val).trim().toUpperCase();
  if(v==='1E' || v==='PE' || v==='YES' || v==='1' || v==='TRUE') return '1E';
  return 'KP'; // KP = không phủ
};
// Hiển thị label cho coating
const coatingLabel = (c) => c==='1E' ? '🎨 PE' : '⬜ NOPE';
const coatingShort = (c) => c==='1E' ? 'PE' : 'NOPE';

const GSHEET_INVENTORY = "https://docs.google.com/spreadsheets/d/1iNyB0XTf3rqZyHcmujYuuKlXh6QXTQqr-LQ1f6IEGxU/export?format=csv&gid=0";
const GSHEET_MINSTOCK  = "https://docs.google.com/spreadsheets/d/1iNyB0XTf3rqZyHcmujYuuKlXh6QXTQqr-LQ1f6IEGxU/export?format=csv&gid=1080747466";
// gid=1080747466 = tab Giá bán, fields: alloy|temper|thickness|width|length|Coating|SellCost|Comment
const GSHEET_SELLING   = "https://docs.google.com/spreadsheets/d/1iNyB0XTf3rqZyHcmujYuuKlXh6QXTQqr-LQ1f6IEGxU/export?format=csv&gid=1080747466";
// Tab Hạn mức: Alloy|InventoryLimit|AccountsPayableLimit|ActualAccountsPayable
const GSHEET_LIMITS    = "https://docs.google.com/spreadsheets/d/1iNyB0XTf3rqZyHcmujYuuKlXh6QXTQqr-LQ1f6IEGxU/export?format=csv&gid=1995461192";

// SKU key includes coating: alloy|temper|thickness|width|length|coating(1E/KP)
const skuKey   = r => `${r.alloy}|${r.temper}|${r.thickness}|${r.width}|${r.length}|${r.coating||'KP'}`;
const skuLabel = r => `${r.alloy} ${r.temper}  ${r.thickness}×${r.width}×${r.length} [${coatingShort(r.coating||'KP')}]`;

const uid  = () => Date.now() + Math.random();
const fv   = v => (isNaN(v)||!isFinite(v)) ? '0' : new Intl.NumberFormat('vi-VN').format(Math.round(v));
const fu   = v => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:1}).format(v||0);
const pn   = s => parseFloat(String(s).replace(/\./g,'').replace(/,/g,''))||0;

// ── CSV PARSER ─────────────────────────────────────────────────────────────────
function parseCsv(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\r/g,'').replace(/\s+/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur='', inQ=false;
    for(let c of line){
      if(c==='"') inQ=!inQ;
      else if(c===',' && !inQ){vals.push(cur.trim().replace(/\r/g,''));cur='';}
      else cur+=c;
    }
    vals.push(cur.trim().replace(/\r/g,''));
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v=>v!==''));
}
async function fetchCsv(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseCsv(await res.text());
}

// ── ENGINE ────────────────────────────────────────────────────────────────────
const weightedAvg = rows => {
  const qty = rows.reduce((s,r)=>s+(parseFloat(r.qtyKg)||0), 0);
  const val = rows.reduce((s,r)=>s+(parseFloat(r.qtyKg)||0)*(parseFloat(r.avgCost)||0), 0);
  return qty > 0 ? val/qty : 0;
};

const groupBySku = rows => {
  const map = {};
  rows.forEach(r => {
    const k = skuKey(r);
    if (!map[k]) map[k] = {key:k,label:skuLabel(r),alloy:r.alloy,temper:r.temper,thickness:r.thickness,width:r.width,length:r.length,coating:r.coating||'KP',inStock:[],inTransit:[]};
    if (r.status==='IN_STOCK') map[k].inStock.push(r); else map[k].inTransit.push(r);
  });
  return Object.values(map);
};

const calcInvoice = (products, exRate) => {
  const usd = products.reduce((s,p)=>s+(p.qtyKg/1000)*p.priceFC, 0);
  return {invoiceUSD:usd, invoiceVND:usd*exRate};
};
const calcLanded = (invoiceVND, totalKg, inp) => {
  const mgmt=invoiceVND*(inp.managementFee/100), tax=invoiceVND*(inp.importTax/100);
  const freight=Math.max(0,inp.freightTotal), proc=inp.processingCost*totalKg;
  const total=invoiceVND+mgmt+tax+freight+proc;
  return {mgmt,tax,freight,proc,landedVND:total,landedPerKg:totalKg>0?total/totalKg:0};
};
const calcFinance = (invoiceVND, land, totalKg, inp) => {
  const days=inp.leadTime+inp.holdingTime; let fin=0;
  if(inp.paymentMethod==='TT'){
    fin=(invoiceVND+land.tax+land.freight)*(inp.capitalCostPercent/100)*(days/365);
  } else {
    fin=invoiceVND*(inp.lcOpenFee/100)+invoiceVND*(inp.lcInterest/100)*(inp.lcDays/365)
       +(invoiceVND*inp.lcMargin/100+land.tax+land.freight)*(inp.capitalCostPercent/100)*(days/365);
  }
  return {finVND:fin,finPerKg:totalKg>0?fin/totalKg:0};
};
const calcProductBreakdown = (products, land, fin, totalKg, inp) => {
  return products.map(p => {
    const ratio=totalKg>0?p.qtyKg/totalKg:0;
    const invVND=(p.qtyKg/1000)*p.priceFC*inp.exchangeRate;
    const mgmt=invVND*(inp.managementFee/100), tax=invVND*(inp.importTax/100);
    const freight=land.freight*ratio, proc=inp.processingCost*p.qtyKg;
    const finRow=fin.finVND*ratio, landedRow=invVND+mgmt+tax+freight+proc;
    const physPerKg=p.qtyKg>0?landedRow/p.qtyKg:0;
    const econPerKg=physPerKg+(p.qtyKg>0?finRow/p.qtyKg:0);
    return {...p,invVND,landedRow,finRow,physPerKg,econPerKg};
  });
};
const findSellPrice = (alloy, temper, sellingPrices) => {
  // Ưu tiên match alloyTemper (legacy) hoặc alloy+temper trong model mới
  const byAT=sellingPrices.find(s=>{
    if(s.alloyTemper) return s.alloyTemper===alloy+' '+temper||s.alloyTemper===alloy;
    return s.alloy===alloy && s.temper===temper;
  });
  if(byAT) return {price:byAT.sellCost||byAT.price||0,label:(byAT.alloy||byAT.alloyTemper)+' '+(byAT.temper||''),comment:byAT.comment||''};
  return null;
};
const calcSkuBlend = (inventory, purchaseRows, sellingPrices, inputs, minStockMap) => {
  const skuGroups=groupBySku(inventory);
  return purchaseRows.map(p => {
    const k=skuKey(p), grp=skuGroups.find(g=>g.key===k);
    const stockRows=grp?grp.inStock:[], transitRows=grp?grp.inTransit:[];
    const allExisting=[...stockRows,...transitRows];
    const avgCurrent=weightedAvg(allExisting), avgStock=weightedAvg(stockRows), avgTransit=weightedAvg(transitRows);
    const qtyStock=stockRows.reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
    const qtyTransit=transitRows.reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
    const qtyExisting=qtyStock+qtyTransit;
    const newRow={qtyKg:p.qtyKg,avgCost:p.physPerKg||0};
    const avgAfter=weightedAvg([...allExisting.map(r=>({qtyKg:parseFloat(r.qtyKg)||0,avgCost:parseFloat(r.avgCost)||0})),newRow]);
    const qtyAfter=qtyExisting+p.qtyKg;
    const finPerKg=p.qtyKg>0?p.finRow/p.qtyKg:0;
    const custFin=avgAfter*(inputs.lendingRate/100)*(inputs.customerCreditDays/365);
    const breakEven=avgAfter+finPerKg+custFin;
    const spResult=findSellPrice(p.alloy,p.temper,sellingPrices);
    const sellPrice=spResult?spResult.price:0, sellLabel=spResult?spResult.label:'Chưa có giá', sellComment=spResult?spResult.comment:'';
    const hasSellPrice=!!spResult&&sellPrice>0;
    const realProfitPerKg=hasSellPrice?sellPrice*(1-inputs.businessRiskPercent/100)-breakEven:null;
    const isRisk=hasSellPrice?breakEven>sellPrice:false;
    const grossProfitVND=hasSellPrice?realProfitPerKg*p.qtyKg:null;
    const minStock=minStockMap[k]||0, available=qtyAfter;
    const stockRatio=minStock>0?available/minStock:999;
    const stockStatus=stockRatio<0.8?'LOW':stockRatio>2?'EXCESS':'OK';
    const stockDelta=minStock>0?(available-minStock):null;
    return {...p,skuKey:k,skuLbl:skuLabel(p),avgCurrent,avgStock,avgTransit,qtyStock,qtyTransit,qtyExisting,avgAfter,qtyAfter,breakEven,custFin,sellPrice,sellLabel,sellComment,hasSellPrice,realProfitPerKg,grossProfitVND,isRisk,minStock,available,stockRatio,stockStatus,stockDelta};
  });
};

// ── REPORT ENGINE ─────────────────────────────────────────────────────────────
// FIX #1: Tổng Vốn tồn kho = kg × avgCost (giá vốn), không phải giá bán
const calcInventoryValue = (inventoryRows) => {
  return inventoryRows.reduce((s,r) => {
    const qty = parseFloat(r.qtyKg)||0;
    const cost = parseFloat(r.avgCost)||0; // GIÁ VỐN
    return s + qty * cost;
  }, 0);
};

const calcAlloySummary = (inventory, finPerKg, inputs, purchaseRows, sellingPrices) => {
  const alloyMap = {};
  inventory.forEach(r => {
    const a=r.alloy; const qty=parseFloat(r.qtyKg)||0; const cost=parseFloat(r.avgCost)||0;
    if(!alloyMap[a]) alloyMap[a]={alloy:a,rows:[],totalKg:0,totalCostValue:0,
      coatedKg:0,plainKg:0,coatedCostValue:0,plainCostValue:0};
    alloyMap[a].rows.push(r);
    alloyMap[a].totalKg+=qty;
    alloyMap[a].totalCostValue+=qty*cost; // Vốn = kg × avgCost
    if((r.coating||'KP')==='1E'){
      alloyMap[a].coatedKg+=qty; alloyMap[a].coatedCostValue+=qty*cost;
    } else {
      alloyMap[a].plainKg+=qty; alloyMap[a].plainCostValue+=qty*cost;
    }
  });
  const allRows=inventory.map(r=>({qtyKg:parseFloat(r.qtyKg)||0,avgCost:parseFloat(r.avgCost)||0}));
  const globalKg=allRows.reduce((s,r)=>s+r.qtyKg,0);
  const globalCostValue=allRows.reduce((s,r)=>s+r.qtyKg*r.avgCost,0); // Vốn = kg × avgCost
  const globalAvg=weightedAvg(allRows);

  const globalCoatedKg=inventory.filter(r=>(r.coating||'KP')==='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
  const globalPlainKg=inventory.filter(r=>(r.coating||'KP')!=='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
  const globalCoatedCostValue=inventory.filter(r=>(r.coating||'KP')==='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0)*(parseFloat(r.avgCost)||0),0);
  const globalPlainCostValue=inventory.filter(r=>(r.coating||'KP')!=='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0)*(parseFloat(r.avgCost)||0),0);

  const purchaseAlloyMap = {};
  (purchaseRows||[]).forEach(p=>{
    const a=p.alloy; if(!purchaseAlloyMap[a]) purchaseAlloyMap[a]={qtyKg:0,totalCost:0};
    purchaseAlloyMap[a].qtyKg+=p.qtyKg; purchaseAlloyMap[a].totalCost+=p.qtyKg*(p.physPerKg||0);
  });
  const alloyStats = Object.values(alloyMap).map(g=>{
    const avgBefore=g.totalKg>0?g.totalCostValue/g.totalKg:0;
    const pa=purchaseAlloyMap[g.alloy]||{qtyKg:0,totalCost:0};
    const totalAfterKg=g.totalKg+pa.qtyKg;
    const totalAfterValue=g.totalCostValue+pa.totalCost;
    const avgAfter=totalAfterKg>0?totalAfterValue/totalAfterKg:avgBefore;
    const custFin=avgAfter*(inputs.lendingRate/100)*(inputs.customerCreditDays/365);
    const breakEven=avgAfter+(finPerKg||0)+custFin;
    return {alloy:g.alloy,totalKg:g.totalKg,totalCostValue:g.totalCostValue,
      coatedKg:g.coatedKg,plainKg:g.plainKg,coatedCostValue:g.coatedCostValue,plainCostValue:g.plainCostValue,
      avgBefore,avgAfter,breakEven,totalAfterKg,totalAfterValue};
  });
  const allPRows=Object.values(purchaseAlloyMap);
  const globalAfterKg=globalKg+allPRows.reduce((s,p)=>s+p.qtyKg,0);
  const globalAfterValue=globalCostValue+allPRows.reduce((s,p)=>s+p.totalCost,0);
  const globalAvgAfter=globalAfterKg>0?globalAfterValue/globalAfterKg:globalAvg;
  const custFin=globalAvgAfter*(inputs.lendingRate/100)*(inputs.customerCreditDays/365);
  const globalBreakEven=globalAvgAfter+(finPerKg||0)+custFin;
  return {alloyStats,globalKg,globalCostValue,globalAvg,globalAvgAfter,globalBreakEven,
    globalAfterKg,globalAfterValue,globalCoatedKg,globalPlainKg,globalCoatedCostValue,globalPlainCostValue};
};

// ── LIMITS WARNINGS ──────────────────────────────────────────────────────────
// Per-alloy: chỉ cảnh báo A (Vốn TK > InventoryLimit)
// TOÀN KHO: 3 cảnh báo A/B/C lấy từ row alloy='total' trong GSheet
const calcLimitsWarnings = (limitsData, inventory) => {
  const globalCostValue = calcInventoryValue(inventory);
  const globalCoatedCostValue = calcInventoryValue(inventory.filter(r=>(r.coating||'KP')==='1E'));
  const globalPlainCostValue = calcInventoryValue(inventory.filter(r=>(r.coating||'KP')!=='1E'));
  // Tách row 'total' cho 3 cảnh báo toàn kho
  const totalRow = limitsData.find(l=>l.alloy.toLowerCase()==='total')||null;
  const alloyRows = limitsData.filter(l=>l.alloy.toLowerCase()!=='total');
  // Lấy hạn mức toàn kho từ row 'total'
  const globalInvLimit = totalRow ? (totalRow.inventoryLimit||0) : 0;
  const globalAPLimit  = totalRow ? (totalRow.accountsPayableLimit||0) : 0;
  const globalActualAP = totalRow ? (totalRow.actualAccountsPayable||0) : 0;
  const globalCreditLimit = globalInvLimit + globalAPLimit;
  // 3 cảnh báo toàn kho
  const gInvOver   = globalInvLimit>0    && globalCostValue > globalInvLimit;
  const gInvNear   = globalInvLimit>0    && globalCostValue > globalInvLimit*0.85 && !gInvOver;
  const gInvPct    = globalInvLimit>0    ? Math.round(globalCostValue/globalInvLimit*100) : null;
  const gTotalUsed = globalCostValue + globalActualAP;
  const gCreditOver= globalCreditLimit>0 && gTotalUsed > globalCreditLimit;
  const gCreditNear= globalCreditLimit>0 && gTotalUsed > globalCreditLimit*0.85 && !gCreditOver;
  const gApOver    = globalAPLimit>0     && globalActualAP > globalAPLimit;
  const gApNear    = globalAPLimit>0     && globalActualAP > globalAPLimit*0.85 && !gApOver;
  const gApPct     = globalAPLimit>0     ? Math.round(globalActualAP/globalAPLimit*100) : null;
  // Per-alloy: chỉ cảnh báo A
  const rows = alloyRows.map(lim => {
    const alloyInv = inventory.filter(r=>r.alloy===lim.alloy);
    const invCostValue   = calcInventoryValue(alloyInv);
    const coatedCostValue= calcInventoryValue(alloyInv.filter(r=>(r.coating||'KP')==='1E'));
    const plainCostValue = calcInventoryValue(alloyInv.filter(r=>(r.coating||'KP')!=='1E'));
    const invKg    = alloyInv.reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
    const coatedKg = alloyInv.filter(r=>(r.coating||'KP')==='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
    const plainKg  = alloyInv.filter(r=>(r.coating||'KP')!=='1E').reduce((s,r)=>s+(parseFloat(r.qtyKg)||0),0);
    const invLim   = lim.inventoryLimit||0;
    const invOver  = invLim>0 && invCostValue > invLim;
    const invNear  = invLim>0 && invCostValue > invLim*0.85 && !invOver;
    const invPct   = invLim>0 ? Math.round(invCostValue/invLim*100) : null;
    const hasAlert = invOver;
    const hasWarn  = !hasAlert && invNear;
    return {...lim, invKg, coatedKg, plainKg,
      invCostValue, coatedCostValue, plainCostValue,
      invOver, invNear, invPct, hasAlert, hasWarn};
  });
  return {rows, totalRow,
    globalCostValue, globalCoatedCostValue, globalPlainCostValue,
    globalActualAP, globalAPLimit, globalInvLimit, globalCreditLimit,
    gTotalUsed, gInvOver, gInvNear, gInvPct,
    gCreditOver, gCreditNear, gApOver, gApNear, gApPct};
};

// ── STOCK BAR ─────────────────────────────────────────────────────────────────
const StockBar=({available,minStock,showDelta=true})=>{
  if(!minStock) return <span style={{fontSize:'.65rem',color:'#3a5570'}}>—</span>;
  const ratio=Math.min(available/minStock,2.5);
  const pctW=Math.min((ratio/2.5)*100,100);
  const color=ratio<0.8?'#ef4444':ratio<1?'#f59e0b':ratio>2?'#6366f1':'#22c55e';
  const delta=available-minStock;
  return(
    <div style={{minWidth:90}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'#5a7a92',marginBottom:2}}>
        <span className="mono">{fv(available)} kg</span>
        <span style={{color,fontWeight:700}}>{Math.round(ratio*100)}%</span>
      </div>
      <div className="stock-bar"><div className="stock-bar-fill" style={{width:`${pctW}%`,background:color}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',marginTop:2}}>
        <span style={{color:'#3a5570'}}>min {fv(minStock)} kg</span>
        {showDelta&&<span style={{color,fontWeight:700}}>{delta>=0?'▲ dư +':'▼ thiếu '}{fv(Math.abs(delta))} kg</span>}
      </div>
    </div>
  );
};

// ── LIMIT BAR ─────────────────────────────────────────────────────────────────
const LimitBar=({actual,limit,label,unit='đ'})=>{
  if(!limit) return null;
  const pct=Math.round(actual/limit*100);
  const over=actual>limit, near=actual>limit*0.85&&!over;
  const color=over?'#ef4444':near?'#f59e0b':'#22c55e';
  const delta=actual-limit;
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.61rem',color:'#5a7a92',marginBottom:2}}>
        <span>{label}</span><span style={{color,fontWeight:700}}>{pct}% hạn mức</span>
      </div>
      <div className="stock-bar" style={{height:6}}><div className="stock-bar-fill" style={{width:`${Math.min(pct,100)}%`,background:color}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'.62rem',marginTop:3}}>
        <span className="mono" style={{color:'#93c5fd'}}>{fv(actual)}{unit}</span>
        {over&&<span style={{color:'#fc8181',fontWeight:800}}>▲ Vượt {fv(Math.abs(delta))}{unit}</span>}
        {near&&<span style={{color:'#fcd34d',fontWeight:700}}>⚡ Còn {fv(limit-actual)}{unit}</span>}
        {!over&&!near&&<span style={{color:'#4ade80'}}>▼ Còn {fv(limit-actual)}{unit}</span>}
      </div>
    </div>
  );
};

          const rows=data.filter(r=>r.alloy).map((r,i)=>({
            id:uid()+i,
            alloy:(r.alloy||'').trim(),
            inventoryLimit:parseFloat(r.inventorylimit||r['inventory limit']||r['inventorylimit']||0),
            accountsPayableLimit:parseFloat(r.accountspayablelimit||r['accounts payable limit']||r['accountspayable']||r['accountspayablelimit']||0),
            actualAccountsPayable:parseFloat(r.actualaccountspayable||r['actual accounts payable']||r['actualaccountspayable']||0),
          })).filter(r=>r.alloy);
          if(rows.length>0) setLimitsData(rows);
        }
      });
      setDbStatus({loading:false,error:errMsg,lastSync:new Date().toLocaleTimeString('vi-VN'),source:'gsheet'});
    }catch(e){
      setDbStatus(p=>({...p,loading:false,error:e.message||'Lỗi'}));
    }
  },[]);

  // ── COMPUTE ───────────────────────────────────────────────────────────────
  const result=useMemo(()=>{
    const totalKg=products.reduce((s,p)=>s+p.qtyKg,0);
    if(totalKg<=0) return null;
    const inv=calcInvoice(products,inputs.exchangeRate);
    const land=calcLanded(inv.invoiceVND,totalKg,inputs);
    const fin=calcFinance(inv.invoiceVND,land,totalKg,inputs);
    const rows=calcProductBreakdown(products,land,fin,totalKg,inputs);
    const blends=calcSkuBlend(inventory,rows,sellingPrices,inputs,minStockMap);
    const allInvRows=inventory.map(r=>({qtyKg:parseFloat(r.qtyKg)||0,avgCost:parseFloat(r.avgCost)||0}));
    const newPurchRows=rows.map(r=>({qtyKg:r.qtyKg,avgCost:r.physPerKg}));
    const globalAvgBefore=weightedAvg(allInvRows);
    const globalAvgAfter=weightedAvg([...allInvRows,...newPurchRows]);
    const custFin=globalAvgAfter*(inputs.lendingRate/100)*(inputs.customerCreditDays/365);
    const globalBreakEven=globalAvgAfter+fin.finPerKg+custFin;
    const hasRisk=blends.some(b=>b.isRisk);
    const hasLowStock=blends.some(b=>b.stockStatus==='LOW');
    const totalContainer=totalKg/1000;
    const containerOk=totalContainer>=24.5&&totalContainer<=26.5;
    const blendsWithPrice=blends.filter(b=>b.grossProfitVND!=null);
    const totalGrossProfit=blendsWithPrice.reduce((s,b)=>s+b.grossProfitVND,0);
    const totalQtyPriced=blendsWithPrice.reduce((s,b)=>s+b.qtyKg,0);
    const avgProfitPerKg=totalQtyPriced>0?totalGrossProfit/totalQtyPriced:null;
    const profitMargin=inv.invoiceVND>0?totalGrossProfit/inv.invoiceVND*100:null;
    const allPriced=blends.every(b=>b.hasSellPrice);
    const missingPriceSkus=blends.filter(b=>!b.hasSellPrice).map(b=>`${b.alloy} ${b.temper}`);
    const rec=!hasRisk
      ?(totalGrossProfit>0?{txt:'✓ NÊN MUA – CÓ LÃI',cls:'tg'}:{txt:'HÒA VỐN – CÂN NHẮC',cls:'tb'})
      :{txt:'⚠ RỦI RO – XEM LẠI',cls:'tr'};
    return{totalKg,...inv,...land,...fin,rows,blends,
      globalAvgBefore,globalAvgAfter,globalBreakEven,custFin,
      hasRisk,hasLowStock,rec,totalContainer,containerOk,
      totalGrossProfit,totalQtyPriced,avgProfitPerKg,profitMargin,
      allPriced,missingPriceSkus};
  },[inputs,products,inventory,sellingPrices,minStockMap]);

  // ── REPORT DATA ───────────────────────────────────────────────────────────
  const reportData=useMemo(()=>{
    const finPerKg=result?result.finPerKg:0;
    const purchaseRows=result?result.rows:[];
    return calcAlloySummary(inventory,finPerKg,inputs,purchaseRows,sellingPrices);
  },[inventory,result,inputs,sellingPrices]);

  // FIX #3: calcLimitsWarnings dùng avgCost (giá vốn), không cần sellingPrices
  const limitsWarnings=useMemo(()=>{
    return calcLimitsWarnings(limitsData,inventory);
  },[limitsData,inventory]);

  const totalLimitAlerts=limitsWarnings.rows.filter(l=>l.hasAlert).length;

  // CHART
  useEffect(()=>{
    if(!result||!chartRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const labels=result.blends.map(b=>`${b.alloy} ${b.temper} ${b.thickness}mm [${coatingShort(b.coating||'KP')}]`);
    chartInst.current=new Chart(chartRef.current.getContext('2d'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'BQ Hiện tại',data:result.blends.map(b=>b.avgCurrent),backgroundColor:'#1e3a5f',borderRadius:3},
        {label:'Lô mới',     data:result.blends.map(b=>b.physPerKg), backgroundColor:'#14532d',borderRadius:3},
        {label:'BQ Sau nhập',data:result.blends.map(b=>b.avgAfter),  backgroundColor:'#1d4ed8',borderRadius:3},
        {label:'Break-even', data:result.blends.map(b=>b.breakEven), backgroundColor:'#5b21b6',borderRadius:3},
        {label:'Giá bán KH', data:result.blends.map(b=>b.sellPrice||0),backgroundColor:'#166534',borderRadius:3},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'bottom',labels:{color:'#7ba3be',font:{size:10},padding:8,usePointStyle:true}},
          tooltip:{callbacks:{label:c=>c.dataset.label+': '+fv(c.parsed.y)+' đ/kg'}}
        },
        scales:{
          x:{grid:{color:'#1a2a3a'},ticks:{color:'#5a7a92',font:{size:9}}},
          y:{grid:{color:'#1a2a3a'},beginAtZero:false,
             min:result.blends.length?Math.min(...result.blends.flatMap(b=>[b.avgCurrent||0,b.physPerKg||0]))*0.97:0,
             ticks:{color:'#5a7a92',font:{size:9},callback:v=>fv(v)}}
        }
      }
    });
  },[result]);

  // CRUD
  const addProduct=()=>setProducts(p=>[...p,{id:uid(),alloy:'A5052',temper:'H32',thickness:'1.0',width:'1200',length:'Coil',coating:'KP',qtyKg:1000,priceFC:4000}]);
  const delProduct=id=>{if(products.length>1) setProducts(p=>p.filter(r=>r.id!==id));};
  const setProduct=(id,patch)=>setProducts(p=>p.map(r=>r.id===id?{...r,...patch}:r));
  const addInv=()=>setInvs(p=>[...p,{id:uid(),alloy:'A5052',temper:'H32',thickness:'1.0',width:'1200',length:'Coil',coating:'KP',status:'IN_STOCK',qtyKg:0,avgCost:0}]);
  const delInv=id=>setInvs(p=>p.filter(r=>r.id!==id));
  const setInv=(id,patch)=>setInvs(p=>p.map(r=>r.id===id?{...r,...patch}:r));
  const addMS=()=>setMinStockRows(p=>[...p,{id:uid(),alloy:'A5052',temper:'H32',thickness:'1.0',width:'1200',length:'Coil',coating:'KP',minStockKg:0}]);
  const delMS=id=>setMinStockRows(p=>p.filter(r=>r.id!==id));
  const setMS=(id,patch)=>setMinStockRows(p=>p.map(r=>r.id===id?{...r,...patch}:r));
  const addSP=()=>setSP(p=>[...p,{id:uid(),alloy:'A5052',temper:'H32',thickness:'1.0',width:'1200',length:'Coil',coating:'KP',sellCost:0,comment:''}]);
  const delSP=id=>setSP(p=>p.filter(r=>r.id!==id));
  const setSpR=(id,f,v)=>setSP(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));
  const addLim=()=>setLimitsData(p=>[...p,{id:uid(),alloy:'',inventoryLimit:0,accountsPayableLimit:0,actualAccountsPayable:0}]);
  const delLim=id=>setLimitsData(p=>p.filter(r=>r.id!==id));
  const setLim=(id,f,v)=>setLimitsData(p=>p.map(r=>r.id===id?{...r,[f]:v}:r));
  const saveScenario=()=>{
    if(!result) return;
    setScenarios(p=>[...p,{
      id:uid(),
      name:`${new Date().toLocaleDateString('vi-VN')} · ${products.map(p=>p.alloy+' '+p.temper+' ['+coatingShort(p.coating||'KP')+']').join('+')}`,
      date:new Date().toLocaleDateString('vi-VN'),
      totalKg:result.totalKg,invoiceUSD:result.invoiceUSD,
      globalAvgBefore:result.globalAvgBefore,globalAvgAfter:result.globalAvgAfter,
      globalBreakEven:result.globalBreakEven,hasRisk:result.hasRisk,
      totalGrossProfit:result.totalGrossProfit,containerTons:result.totalContainer,
      inputs:{...inputs},products:[...products]
    }]);
  };

  const uniqueInvAlloys=[...new Set(inventory.map(r=>r.alloy))];
  const uniqueMsAlloys=[...new Set(minStockRows.map(r=>r.alloy))];

  // Inventory filter
  const filteredInventory=useMemo(()=>{
    return inventory.filter(r=>{
      if(invFilter.status!=='ALL'&&r.status!==invFilter.status) return false;
      if(invFilter.alloy!=='ALL'&&r.alloy!==invFilter.alloy) return false;
      if(invFilter.coating!=='ALL'&&(r.coating||'KP')!==invFilter.coating) return false;
      if(invFilter.search){const s=invFilter.search.toLowerCase();if(!skuLabel(r).toLowerCase().includes(s)) return false;}
      if(invFilter.stockAlert!=='ALL'){
        const k=skuKey(r),ms=minStockMap[k]||0;
        const grpQty=inventory.filter(x=>skuKey(x)===k).reduce((s,x)=>s+(parseFloat(x.qtyKg)||0),0);
        const ratio=ms>0?grpQty/ms:null;
        if(invFilter.stockAlert==='LOW'&&!(ratio!==null&&ratio<0.8)) return false;
        if(invFilter.stockAlert==='NEAR'&&!(ratio!==null&&ratio>=0.8&&ratio<1)) return false;
        if(invFilter.stockAlert==='OK'&&!(ratio===null||ratio>=1)) return false;
        if(invFilter.stockAlert==='EXCESS'&&!(ratio!==null&&ratio>2)) return false;
      }
      return true;
    });
  },[inventory,invFilter,minStockMap]);

  const filteredMs=useMemo(()=>{
    return minStockRows.filter(r=>{
      if(msFilter.alloy!=='ALL'&&r.alloy!==msFilter.alloy) return false;
      if(msFilter.coating!=='ALL'&&(r.coating||'KP')!==msFilter.coating) return false;
      if(msFilter.search){const s=msFilter.search.toLowerCase();if(!skuLabel(r).toLowerCase().includes(s)) return false;}
      if(msFilter.stockAlert!=='ALL'){
        const k=skuKey(r);
        const grp=groupBySku(inventory).find(g=>g.key===k);
        const curQty=grp?[...grp.inStock,...grp.inTransit].reduce((s,x)=>s+(parseFloat(x.qtyKg)||0),0):0;
        const ratio=r.minStockKg>0?curQty/r.minStockKg:null;
        if(msFilter.stockAlert==='LOW'&&!(ratio!==null&&ratio<0.8)) return false;
        if(msFilter.stockAlert==='NEAR'&&!(ratio!==null&&ratio>=0.8&&ratio<1)) return false;
        if(msFilter.stockAlert==='OK'&&!(ratio===null||ratio>=1)) return false;
        if(msFilter.stockAlert==='EXCESS'&&!(ratio!==null&&ratio>2)) return false;
      }
      return true;
    });
  },[minStockRows,msFilter,inventory,minStockMap]);

  const bg1='#0e1520',bg2='#131e2e',bg3='#0c1726',bg4='#0a1220';
  const border1='#1e3347',border2='#2a3f58';

  const FilterBar=({filter,setFilter,alloys,showStatus=true,showCoating=true,showStockAlert=true,total,filtered})=>(
    <div style={{background:bg2,border:`1px solid ${border1}`,borderRadius:8,padding:'11px 14px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:9,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:5,marginRight:4}}><Ic.Filter/><span style={{fontSize:'.68rem',color:'#6b9ab8',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>Lọc</span></div>
        {showStatus&&(
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span style={{fontSize:'.63rem',color:'#5a7a92'}}>Trạng thái:</span>
            {[{v:'ALL',l:'Tất cả'},{v:'IN_STOCK',l:'🟢 Kho'},{v:'IN_TRANSIT',l:'🟡 Đường'}].map(f=>(
              <button key={f.v} className={`chip ${filter.status===f.v?'on':'off'}`} onClick={()=>setFilter(p=>({...p,status:f.v}))}>{f.l}</button>
            ))}
            <div style={{width:1,height:16,background:border1}}/>
          </div>
        )}
        {showCoating&&(
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span style={{fontSize:'.63rem',color:'#5a7a92'}}>Coating:</span>
            {[{v:'ALL',l:'Tất cả'},{v:'KP',l:'⬜ NOPE'},{v:'1E',l:'🎨 PE'}].map(f=>(
              <button key={f.v} className={`chip ${filter.coating===f.v?'on':'off'}`} onClick={()=>setFilter(p=>({...p,coating:f.v}))}>{f.l}</button>
            ))}
            <div style={{width:1,height:16,background:border1}}/>
          </div>
        )}
        <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:'.63rem',color:'#5a7a92'}}>Mác:</span>
          {['ALL',...alloys].map(a=>(
            <button key={a} className={`chip ${filter.alloy===a?'on':'off'}`} onClick={()=>setFilter(p=>({...p,alloy:a}))}>{a==='ALL'?'Tất cả':a}</button>
          ))}
          <div style={{width:1,height:16,background:border1}}/>
        </div>
        {showStockAlert&&(
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span style={{fontSize:'.63rem',color:'#5a7a92'}}>MinStock:</span>
            {[{v:'ALL',l:'Tất cả'},{v:'LOW',l:'⚠ Thiếu'},{v:'NEAR',l:'⚡ Gần min'},{v:'OK',l:'✓ OK'},{v:'EXCESS',l:'↑ Dư'}].map(f=>(
              <button key={f.v} className={`chip ${filter.stockAlert===f.v?'on':'off'}`} onClick={()=>setFilter(p=>({...p,stockAlert:f.v}))}>{f.l}</button>
            ))}
            <div style={{width:1,height:16,background:border1}}/>
          </div>
        )}
        <input className="inp inp-xs" style={{width:155}} placeholder="🔍 Tìm SKU…" value={filter.search} onChange={e=>setFilter(p=>({...p,search:e.target.value}))}/>
        {(Object.entries(filter).some(([k,v])=>k!=='search'&&v!=='ALL')||filter.search)?(
          <button className="btn btn-danger btn-xs" onClick={()=>setFilter(Object.fromEntries(Object.keys(filter).map(k=>[k,k==='search'?'':'ALL'])))}>✕ Reset</button>
        ):null}
      </div>
      <div style={{marginTop:6,fontSize:'.65rem',color:'#4a7090'}}>Hiển thị {filtered}/{total} dòng</div>
    </div>
  );

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <datalist id="alloy-list">{ALLOYS.map(a=><option key={a} value={a}/>)}</datalist>
      <datalist id="temper-list">{TEMPERS.map(a=><option key={a} value={a}/>)}</datalist>
      <datalist id="thick-list">{THICKS.map(a=><option key={a} value={a}/>)}</datalist>
      <datalist id="width-list">{WIDTHS.map(a=><option key={a} value={a}/>)}</datalist>
      <datalist id="length-list">{LENGTHS.map(a=><option key={a} value={a}/>)}</datalist>

      {/* HEADER */}
      <div style={{background:bg2,borderBottom:`1px solid ${border1}`,padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{background:'linear-gradient(135deg,#1d4ed8,#6d28d9)',borderRadius:'7px',width:'30px',height:'30px',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:'15px',color:'#fff',fontFamily:'JetBrains Mono'}}>P</div>
          <div>
            <div style={{fontWeight:900,fontSize:'15px',letterSpacing:'-.02em',color:'#dce6f4'}}>PAKD BUY <span style={{color:'#60a5fa',fontFamily:'JetBrains Mono',fontSize:'12px'}}>4.4</span></div>
            <div style={{fontSize:'11px',color:'#5a7a92',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em'}}>Vốn TK=kg×avgCost · ⚠A per-alloy · 3 CB Toàn kho (alloy=total)</div>
          </div>
          <div style={{width:'1px',height:'24px',background:border1,margin:'0 4px'}}/>
          {[
            {k:'main',l:'📊 Phân tích'},
            {k:'inventory',l:'📦 Tồn kho'},
            {k:'minstock',l:'📏 Min Stock'},
            {k:'selling',l:'🏷️ Giá bán'},
            {k:'report',l:totalLimitAlerts>0?`📈 Báo cáo ⚠${totalLimitAlerts}`:'📈 Báo cáo'},
            {k:'scenario',l:'💾 Scenarios'},
          ].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} className={`nav-tab ${tab===t.k?'on':''}`}
              style={t.k==='report'&&totalLimitAlerts>0?{color:'#fc8181',borderColor:'#991b1b'}:{}}>
              {t.l}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,background:bg4,border:`1px solid ${border1}`,borderRadius:5,padding:'3px 9px',fontSize:'.68rem'}}>
            <Ic.Database/>
            {dbStatus.loading?(<span style={{color:'#60a5fa',display:'flex',alignItems:'center',gap:4}}><div className="spinner" style={{width:12,height:12}}/> Đang tải...</span>)
              :dbStatus.error?(<span style={{color:'#fc8181'}}>⚠ Lỗi</span>)
              :dbStatus.lastSync?(<span style={{color:'#4ade80'}}>✓ {dbStatus.lastSync}</span>)
              :(<span style={{color:'#5a7a92'}}>Local</span>)}
            <button onClick={()=>syncGoogleSheet('all')} disabled={dbStatus.loading} className="btn btn-ghost" style={{padding:'1px 6px',fontSize:'.65rem',gap:3,marginLeft:2}}>
              <Ic.Refresh/> Sync All
            </button>
          </div>
          {result&&<span className={`tag ${result.rec.cls}`}>{result.rec.txt}</span>}
          {result&&<span className={`tag ${result.containerOk?'tg':result.totalContainer<24?'tr':'ty'}`}>📦 {result.totalContainer.toFixed(1)}T</span>}
          {result&&result.hasLowStock&&<span className="tag tr pulse"><Ic.Alert/> Thiếu hàng</span>}
          {totalLimitAlerts>0&&<span className="tag tr pulse"><Ic.Alert/> {totalLimitAlerts} vượt hạn mức</span>}
          <button className="btn btn-export btn-sm" onClick={()=>result&&exportCsv(result.blends,inputs,result)}><Ic.Download/> CSV</button>
          <button className="btn btn-success btn-sm" onClick={saveScenario}><Ic.Save/> Lưu</button>
          <button className="btn btn-solid btn-sm" onClick={()=>window.print()}><Ic.Print/> In A4</button>
        </div>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden'}}>

        {/* ════ TAB MAIN ════ */}
        {tab==='main'&&(
          <div style={{display:'flex',width:'100%',height:'100%',minHeight:0}}>
            {/* LEFT */}
            <div style={{width:'252px',flexShrink:0,background:bg2,borderRight:`1px solid ${border1}`,overflowY:'auto',padding:'10px',display:'flex',flexDirection:'column',gap:'9px'}}>
              <div className="card">
                <div className="sh"><Ic.Ship/>Thông số nhập khẩu</div>
                <label className="lbl" style={{color:'#60a5fa'}}>Tỷ giá USD/VND</label>
                <input className="inp mono" style={{fontSize:'1.05rem',fontWeight:800,color:'#60a5fa',textAlign:'right',marginBottom:9}} value={fv(inputs.exchangeRate)} onChange={e=>setInp('exchangeRate',pn(e.target.value))}/>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',marginBottom:7}}>
                  <div><label className="lbl" style={{color:'#d8b4fe'}}>Hệ số QL %</label><input type="number" step=".1" className="inp inp-xs" style={{color:'#d8b4fe'}} value={inputs.managementFee} onChange={e=>setInp('managementFee',parseFloat(e.target.value)||0)}/></div>
                  <div><label className="lbl">Thuế NK %</label><input type="number" className="inp inp-xs" value={inputs.importTax} onChange={e=>setInp('importTax',parseFloat(e.target.value)||0)}/></div>
                  <div><label className="lbl">Cước VND</label><input className="inp inp-xs mono" style={{textAlign:'right'}} value={fv(inputs.freightTotal)} onChange={e=>setInp('freightTotal',pn(e.target.value))}/></div>
                  <div><label className="lbl">Gia công đ/kg</label><input type="number" className="inp inp-xs" value={inputs.processingCost} onChange={e=>setInp('processingCost',pn(e.target.value))}/></div>
                  <div><label className="lbl">Lead time ngày</label><input type="number" className="inp inp-xs" value={inputs.leadTime} onChange={e=>setInp('leadTime',parseInt(e.target.value)||0)}/></div>
                  <div><label className="lbl">Hold time ngày</label><input type="number" className="inp inp-xs" value={inputs.holdingTime} onChange={e=>setInp('holdingTime',parseInt(e.target.value)||0)}/></div>
                </div>
                <div style={{display:'flex',gap:'5px',marginBottom:6}}>
                  {['TT','LC'].map(m=>(
                    <button key={m} className={`status-btn ${inputs.paymentMethod===m?(m==='TT'?'s-stock':'s-transit'):'off'}`} onClick={()=>setInp('paymentMethod',m)}>{m==='TT'?'T/T':'L/C'}</button>
                  ))}
                </div>
                {inputs.paymentMethod==='LC'?(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'4px',background:bg4,padding:'7px',borderRadius:'4px',border:`1px solid ${border1}`}}>
                    <div><label className="lbl">Margin%</label><input type="number" className="inp inp-xs" value={inputs.lcMargin} onChange={e=>setInp('lcMargin',parseFloat(e.target.value)||0)}/></div>
                    <div><label className="lbl">Days</label><input type="number" className="inp inp-xs" value={inputs.lcDays} onChange={e=>setInp('lcDays',parseInt(e.target.value)||0)}/></div>
                    <div><label className="lbl">Int%</label><input type="number" step=".1" className="inp inp-xs" value={inputs.lcInterest} onChange={e=>setInp('lcInterest',parseFloat(e.target.value)||0)}/></div>
                  </div>
                ):(
                  <div><label className="lbl">Lãi suất vốn %/năm</label><input type="number" step=".1" className="inp inp-xs" value={inputs.capitalCostPercent} onChange={e=>setInp('capitalCostPercent',parseFloat(e.target.value)||0)}/></div>
                )}
              </div>
              <div className="card">
                <div className="sh" style={{color:'#fb923c',borderColor:'#c2410c30'}}><Ic.Tag/><span style={{color:'#fb923c'}}>Chính sách bán hàng</span></div>

                        <div className="mono" style={{fontSize:'.88rem',fontWeight:800,color:x.c,lineHeight:1.2}}>{x.v}</div>
                        {x.note&&<div style={{fontSize:'.58rem',color:'#3a5570',marginTop:3}}>{x.note}</div>}
                      </div>
                    ))}
                  </div>
                  {/* Coating breakdown toàn kho */}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:12}}>
                    {[
                      {lbl:'⬜ NOPE (Không phủ / KP)',kg:reportData.globalPlainKg,val:reportData.globalPlainCostValue,bg:'#0d0a00',br:'#ca8a04',c:'#facc15'},
                      {lbl:'🎨 PE (Có phủ / 1E)',     kg:reportData.globalCoatedKg,val:reportData.globalCoatedCostValue,bg:'#001c14',br:'#059669',c:'#34d399'},
                    ].map((x,i)=>(
                      <div key={i} style={{background:x.bg,border:`1px solid ${x.br}`,borderRadius:6,padding:'8px 11px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div><div style={{fontSize:'.65rem',color:x.c,fontWeight:700,marginBottom:3}}>{x.lbl}</div><div className="mono" style={{fontSize:'.88rem',fontWeight:700,color:x.c}}>{fv(x.kg)} kg</div></div>
                        <div style={{textAlign:'right'}}><div style={{fontSize:'.6rem',color:'#5a7a92'}}>Vốn (kg×avgCost)</div><div className="mono" style={{fontSize:'.78rem',color:x.c,fontWeight:700}}>{fv(x.val)}đ</div></div>
                      </div>
                    ))}
                  </div>
                  {/* 3 CẢNH BÁO TOÀN KHO – lấy từ GSheet row alloy='total' */}
                  <div style={{borderTop:'1px solid #1e3347',paddingTop:11}}>
                    <div style={{fontSize:'.63rem',color:limitsWarnings.gInvOver||limitsWarnings.gCreditOver||limitsWarnings.gApOver?'#fc8181':limitsWarnings.gInvNear||limitsWarnings.gCreditNear||limitsWarnings.gApNear?'#fcd34d':'#6b9ab8',fontWeight:800,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,display:'flex',alignItems:'center',gap:5}}>
                      <Ic.Alert/> 3 Cảnh báo hạn mức toàn kho (GSheet alloy="total")
                      {!limitsWarnings.totalRow&&<span style={{color:'#854d0e',marginLeft:8,fontWeight:600,textTransform:'none'}}>⚠ Chưa có row alloy="total"</span>}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:9}}>
                      {/* A: Vốn TK > InventoryLimit */}
                      <div style={{background:limitsWarnings.gInvOver?'#1c0505':limitsWarnings.gInvNear?'#1c1500':bg4,border:`1px solid ${limitsWarnings.gInvOver?'#991b1b':limitsWarnings.gInvNear?'#854d0e':border1}`,borderRadius:6,padding:'9px 11px'}}>
                        <div style={{fontSize:'.62rem',fontWeight:800,color:limitsWarnings.gInvOver?'#fc8181':limitsWarnings.gInvNear?'#fcd34d':'#4ade80',marginBottom:5,display:'flex',alignItems:'center',gap:4}}>
                          {limitsWarnings.gInvOver&&<Ic.Alert/>}📦 A: Vốn TK {'>'} InventoryLimit
                        </div>
                        {limitsWarnings.globalInvLimit>0
                          ?<LimitBar actual={limitsWarnings.globalCostValue} limit={limitsWarnings.globalInvLimit} label={`Hạn mức: ${fv(limitsWarnings.globalInvLimit)}đ`}/>
                          :<div style={{fontSize:'.62rem',color:'#3a5570'}}>Chưa cấu hình</div>}
                        {limitsWarnings.gInvPct!=null&&<div style={{fontSize:'.6rem',color:'#5a7a92',marginTop:3,textAlign:'right'}}>{limitsWarnings.gInvPct}% hạn mức</div>}
                      </div>
                      {/* B: Vốn TK + CN > CreditLimit */}
                      <div style={{background:limitsWarnings.gCreditOver?'#1c0505':limitsWarnings.gCreditNear?'#1c1500':bg4,border:`1px solid ${limitsWarnings.gCreditOver?'#991b1b':limitsWarnings.gCreditNear?'#854d0e':border1}`,borderRadius:6,padding:'9px 11px'}}>
                        <div style={{fontSize:'.62rem',fontWeight:800,color:limitsWarnings.gCreditOver?'#fc8181':limitsWarnings.gCreditNear?'#fcd34d':'#4ade80',marginBottom:5,display:'flex',alignItems:'center',gap:4}}>
                          {limitsWarnings.gCreditOver&&<Ic.Alert/>}💳 B: Vốn TK + CN {'>'} CreditLimit
                        </div>
                        {limitsWarnings.globalCreditLimit>0?(
                          <>
                            <div style={{fontSize:'.59rem',color:'#5a7a92',marginBottom:4}}>CreditLimit = InvLimit+APLimit = <strong style={{color:'#d8b4fe'}}>{fv(limitsWarnings.globalCreditLimit)}đ</strong></div>
                            <LimitBar actual={limitsWarnings.gTotalUsed} limit={limitsWarnings.globalCreditLimit} label={`Đã dùng: ${fv(limitsWarnings.gTotalUsed)}đ`}/>
                          </>
                        ):<div style={{fontSize:'.62rem',color:'#3a5570'}}>Chưa cấu hình</div>}
                      </div>
                      {/* C: CN > APLimit */}
                      <div style={{background:limitsWarnings.gApOver?'#1c0505':limitsWarnings.gApNear?'#1c1500':bg4,border:`1px solid ${limitsWarnings.gApOver?'#991b1b':limitsWarnings.gApNear?'#854d0e':border1}`,borderRadius:6,padding:'9px 11px'}}>
                        <div style={{fontSize:'.62rem',fontWeight:800,color:limitsWarnings.gApOver?'#fc8181':limitsWarnings.gApNear?'#fcd34d':'#4ade80',marginBottom:5,display:'flex',alignItems:'center',gap:4}}>
                          {limitsWarnings.gApOver&&<Ic.Alert/>}🏦 C: Công nợ {'>'} APLimit
                        </div>
                        {limitsWarnings.globalAPLimit>0?(
                          <>
                            <LimitBar actual={limitsWarnings.globalActualAP} limit={limitsWarnings.globalAPLimit} label={`APLimit: ${fv(limitsWarnings.globalAPLimit)}đ`}/>
                            <div style={{marginTop:6}}>
                              <label className="lbl" style={{fontSize:'.56rem'}}>CN thực tế (cập nhật)</label>
                              <input className="inp inp-xs mono" style={{color:'#fcd34d'}}
                                value={fv(limitsWarnings.globalActualAP)}
                                onChange={e=>{if(limitsWarnings.totalRow) setLim(limitsWarnings.totalRow.id,'actualAccountsPayable',pn(e.target.value));}}/>
                            </div>
                          </>
                        ):<div style={{fontSize:'.62rem',color:'#3a5570'}}>Chưa cấu hình</div>}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Per alloy cards */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(380px,1fr))',gap:11}}>
                  {reportData.alloyStats.map((g,i)=>{
                    const limRow=limitsWarnings.rows.find(l=>l.alloy===g.alloy);
                    return(
                      <div key={i} className={`rpt-alloy ${limRow?.hasAlert?'has-alert':limRow?.hasWarn?'has-warn':''}`}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                          <div style={{fontWeight:900,fontSize:'1rem',color:'#dce6f4'}}>{g.alloy}</div>
                          <div style={{display:'flex',gap:5}}>
                            {limRow?.hasAlert&&<span className="tag tr pulse" style={{fontSize:'.62rem'}}><Ic.Alert/> VƯỢT HẠN MỨC</span>}
                            {limRow&&!limRow.hasAlert&&limRow.hasWarn&&<span className="tag ty" style={{fontSize:'.62rem'}}>⚡ GẦN HẠN MỨC</span>}
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:9}}>
                          {[
                            {l:'KL tồn kho',  v:fv(g.totalKg)+' kg',         c:'#4ade80'},
                            {l:'Vốn TK',      v:fv(g.totalCostValue)+'đ',     c:'#93c5fd',small:true,note:'kg×avgCost'},
                            {l:'BQ Hiện tại', v:fv(g.avgBefore)+' đ/kg',      c:'#94a3b8'},
                            {l:'BQ Sau nhập', v:fv(g.avgAfter)+' đ/kg',       c:g.avgAfter>g.avgBefore?'#fc8181':'#60a5fa'},
                          ].map((x,j)=>(
                            <div key={j} style={{background:bg4,borderRadius:5,padding:'7px 9px'}}>
                              <div style={{fontSize:'.6rem',color:'#5a7a92',marginBottom:2}}>{x.l}{x.note&&<span style={{opacity:.6}}> ({x.note})</span>}</div>
                              <div className="mono" style={{fontSize:x.small?'.78rem':'.85rem',fontWeight:700,color:x.c}}>{x.v}</div>
                            </div>
                          ))}
                        </div>
                        {/* Coating breakdown per alloy */}
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:9}}>
                          <div style={{background:'#0d0a00',border:'1px solid #ca8a04',borderRadius:5,padding:'6px 8px'}}>
                            <div style={{fontSize:'.6rem',color:'#facc15',fontWeight:700,marginBottom:2}}>⬜ NOPE (KP)</div>
                            <div className="mono" style={{fontSize:'.82rem',color:'#facc15',fontWeight:700}}>{fv(g.plainKg)} kg</div>
                            <div style={{fontSize:'.6rem',color:'#5a7a92',marginTop:1}}>{fv(g.plainCostValue)}đ</div>
                          </div>
                          <div style={{background:'#001c14',border:'1px solid #059669',borderRadius:5,padding:'6px 8px'}}>
                            <div style={{fontSize:'.6rem',color:'#34d399',fontWeight:700,marginBottom:2}}>🎨 PE (1E)</div>
                            <div className="mono" style={{fontSize:'.82rem',color:'#34d399',fontWeight:700}}>{fv(g.coatedKg)} kg</div>
                            <div style={{fontSize:'.6rem',color:'#5a7a92',marginTop:1}}>{fv(g.coatedCostValue)}đ</div>
                          </div>
                        </div>
                        <div style={{background:bg4,borderRadius:5,padding:'7px 9px',textAlign:'center',marginBottom:9}}>
                          <div style={{fontSize:'.6rem',color:'#5a7a92',marginBottom:2}}>Break-even</div>
                          <div className="mono" style={{fontSize:'.88rem',fontWeight:800,color:'#d8b4fe'}}>{fv(g.breakEven)} đ/kg</div>
                        </div>
                        {/* Chỉ cảnh báo A: Vốn TK > InventoryLimit */}
                        {limRow&&limRow.inventoryLimit>0&&(
                          <div style={{background:bg4,borderRadius:5,padding:'7px 9px',border:`1px solid ${limRow.invOver?'#991b1b':limRow.invNear?'#854d0e':border1}`}}>
                            <div style={{fontSize:'.62rem',color:limRow.invOver?'#fc8181':limRow.invNear?'#fcd34d':'#7ba3be',fontWeight:700,marginBottom:5,display:'flex',alignItems:'center',gap:4}}>
                              {limRow.invOver&&<Ic.Alert/>}📦 Vốn TK vs InventoryLimit
                              {limRow.invPct!=null&&<span style={{marginLeft:'auto',fontFamily:'JetBrains Mono,monospace',fontSize:'.65rem'}}>{limRow.invPct}%</span>}
                            </div>
                            <LimitBar actual={limRow.invCostValue} limit={limRow.inventoryLimit} label={`Hạn mức: ${fv(limRow.inventoryLimit)}đ`}/>
                            {(limRow.coatedKg>0||limRow.plainKg>0)&&(
                              <div style={{marginTop:7,display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
                                <div style={{background:'#0d0a0080',borderRadius:4,padding:'4px 6px'}}>
                                  <div style={{fontSize:'.58rem',color:'#facc15'}}>⬜ NOPE: {fv(limRow.plainKg)}kg</div>
                                  <div className="mono" style={{fontSize:'.65rem',color:'#facc15'}}>{fv(limRow.plainCostValue)}đ</div>
                                </div>
                                <div style={{background:'#001c1480',borderRadius:4,padding:'4px 6px'}}>
                                  <div style={{fontSize:'.58rem',color:'#34d399'}}>🎨 PE: {fv(limRow.coatedKg)}kg</div>
                                  <div className="mono" style={{fontSize:'.65rem',color:'#34d399'}}>{fv(limRow.coatedCostValue)}đ</div>
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* ── PHẦN B: BẢNG HẠN MỨC ── */}
              <div>
                <div style={{fontSize:'.72rem',fontWeight:800,color:'#6b9ab8',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:11,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}><Ic.Database/> B. Quản lý Hạn mức (GSheet gid=1995461192)</div>
                  <button className="btn btn-ghost btn-xs" onClick={addLim}><Ic.Plus/> Thêm alloy</button>
                </div>
                <table className="tbl" style={{background:bg3,borderRadius:8,overflow:'hidden'}}>
                  <thead><tr>
                    <th style={{textAlign:'left',paddingLeft:8}}>Alloy</th>
                    <th>InventoryLimit đ</th><th>APLimit đ</th>
                    <th>CreditLimit đ<br/><span style={{fontSize:'.6rem',fontWeight:400}}>(= Inv + AP)</span></th>
                    <th>Vốn TK thực tế đ<br/><span style={{fontSize:'.6rem',fontWeight:400}}>(kg × avgCost)</span></th>
                    <th>CN Thực tế đ</th>
                    <th>⚠A Vốn TK vs InvLimit</th><th></th>
                  </tr></thead>
                  <tbody>
                    {limitsWarnings.rows.map((lim,i)=>(
                      <tr key={lim.id}>
                        <td style={{paddingLeft:8,width:100}}>
                          <input className="inp inp-xs" style={{fontWeight:700,color:'#dce6f4'}} value={lim.alloy} onChange={e=>setLim(lim.id,'alloy',e.target.value)}/>
                        </td>
                        <td style={{width:130}}><input className="inp inp-xs mono" style={{textAlign:'right',color:'#4ade80'}} value={fv(lim.inventoryLimit)} onChange={e=>setLim(lim.id,'inventoryLimit',pn(e.target.value))}/></td>
                        <td style={{width:130}}><input className="inp inp-xs mono" style={{textAlign:'right',color:'#fb923c'}} value={fv(lim.accountsPayableLimit)} onChange={e=>setLim(lim.id,'accountsPayableLimit',pn(e.target.value))}/></td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#d8b4fe',fontWeight:700}}>{fv((lim.inventoryLimit||0)+(lim.accountsPayableLimit||0))}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:lim.invOver?'#fc8181':lim.invNear?'#fcd34d':'#93c5fd',fontWeight:700}}>{fv(lim.invCostValue)}</td>
                        <td style={{width:140}}><input className="inp inp-xs mono" style={{textAlign:'right',color:'#fcd34d'}} value={fv(lim.actualAccountsPayable||0)} onChange={e=>setLim(lim.id,'actualAccountsPayable',pn(e.target.value))}/></td>
                        {/* Cảnh báo A only */}
                        <td style={{textAlign:'center'}}>
                          {lim.inventoryLimit>0?(
                            <span className={`tag ${lim.invOver?'tr':lim.invNear?'ty':'tg'}`} style={{fontSize:'.63rem'}}>
                              {lim.invPct!=null?lim.invPct+'%':'—'} {lim.invOver?'▲ VƯỢT':lim.invNear?'⚡ GẦN':'✓ OK'}
                            </span>
                          ):<span style={{color:'#3a5570',fontSize:'.63rem'}}>—</span>}
                        </td>
                        <td><button className="btn-danger" onClick={()=>delLim(lim.id)}><Ic.X/></button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="card-inset" style={{marginTop:11}}>
                  <p style={{fontSize:'.78rem',color:'#5a7a92',lineHeight:1.8}}>
                    💡 GSheet Hạn mức cột: <strong style={{color:'#93c5fd'}}>Alloy | InventoryLimit | AccountsPayableLimit | ActualAccountsPayable</strong><br/>
                    Row <strong style={{color:'#60a5fa'}}>alloy="total"</strong> → 3 cảnh báo toàn kho A/B/C trong box TOÀN KHO ·
                    Từng alloy chỉ so sánh <strong style={{color:'#4ade80'}}>Vốn TK vs InventoryLimit</strong><br/>
                    coating GSheet: <strong style={{color:'#34d399'}}>1E</strong>=PE · <strong style={{color:'#facc15'}}>KP</strong>=NOPE
                  </p>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ════ TAB SCENARIOS ════ */}
        {tab==='scenario'&&(
          <div style={{flex:1,padding:'18px',overflowY:'auto',background:bg1}}>
            <div style={{maxWidth:'1060px',margin:'0 auto'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:15}}>
                <h2 style={{fontWeight:900,fontSize:'1.05rem',color:'#dce6f4'}}>💾 Scenarios lưu trữ</h2>
                <button className="btn btn-success btn-sm" onClick={saveScenario}><Ic.Save/> Lưu scenario</button>
              </div>
              {scenarios.length===0?(
                <div className="card" style={{textAlign:'center',padding:44,border:`1px dashed ${border2}`}}>
                  <div style={{fontSize:'2rem',marginBottom:11}}>💾</div>
                  <div style={{color:'#7ba3be',fontWeight:700,fontSize:'.9rem'}}>Chưa có scenario</div>
                </div>
              ):(
                <table className="tbl" style={{background:bg3,borderRadius:8,overflow:'hidden'}}>
                  <thead><tr><th>#</th><th style={{textAlign:'left',paddingLeft:9}}>Tên</th><th>KL kg</th><th>Invoice USD</th><th>BQ Trước</th><th>BQ Sau</th><th>Break-even</th><th>Tổng Lãi VND</th><th>Rủi ro</th><th></th></tr></thead>
                  <tbody>
                    {scenarios.map((s,i)=>(
                      <tr key={s.id}>
                        <td style={{textAlign:'center',color:'#4a7090',fontSize:'.75rem'}} className="mono">{i+1}</td>
                        <td style={{paddingLeft:9}}><div style={{fontWeight:700,fontSize:'.82rem',color:'#dce6f4'}}>{s.name}</div><div style={{fontSize:'.68rem',color:'#5a7a92',marginTop:1}}>{s.date}</div></td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#4ade80'}}>{fv(s.totalKg)}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#fcd34d'}}>{fu(s.invoiceUSD)}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#94a3b8'}}>{fv(s.globalAvgBefore)}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#93c5fd',fontWeight:700}}>{fv(s.globalAvgAfter)}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,color:'#d8b4fe'}}>{fv(s.globalBreakEven)}</td>
                        <td className="mono" style={{textAlign:'right',paddingRight:9,fontWeight:700,color:s.totalGrossProfit>=0?'#4ade80':'#fc8181'}}>{s.totalGrossProfit!=null?(s.totalGrossProfit>=0?'+':'')+fv(s.totalGrossProfit):'—'}</td>
                        <td style={{textAlign:'center'}}><span className={`tag ${s.hasRisk?'tr':'tg'}`}>{s.hasRisk?'⚠ Rủi ro':'✓ An toàn'}</span></td>
                        <td style={{textAlign:'center'}}>
                          <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                            <button className="btn btn-solid btn-xs" onClick={()=>{setProducts(s.products);setInputs(s.inputs);setTab('main');}}>Tải</button>
                            <button className="btn-danger" onClick={()=>setScenarios(p=>p.filter(x=>x.id!==s.id))}><Ic.X/></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

      </div>
    </div>
  );
};

// ── EXPORT CSV ─────────────────────────────────────────────────────────────────
const exportCsv=(blends,inputs,result)=>{
  const rows=[
    ['SKU','Alloy','Temper','Thickness','Width','Length','Coating(GSheet)','Coating(Display)','Qty Mua Kg','Về kho đ/kg','BQ Sau Nhập','Break-even','Giá Bán KH','Lãi/Lỗ /kg','Tổng Lãi/Lỗ VND','Min Stock Kg','Tồn sau mua','Thiếu/Dư kg'],
    ...blends.map(b=>[
      b.skuLbl,b.alloy,b.temper,b.thickness,b.width,b.length,
      b.coating||'KP', // GSheet value: 1E or KP
      b.coating==='1E'?'PE':'NOPE', // Display value
      b.qtyKg,Math.round(b.physPerKg),Math.round(b.avgAfter),Math.round(b.breakEven),
      Math.round(b.sellPrice||0),
      b.realProfitPerKg!=null?Math.round(b.realProfitPerKg):'Chưa có giá',
      b.grossProfitVND!=null?Math.round(b.grossProfitVND):'Chưa có giá',
      b.minStock,b.available,
      b.stockDelta!=null?Math.round(b.stockDelta):'—',
    ])
  ];
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`PAKD_BUY_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
  a.click();URL.revokeObjectURL(url);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
