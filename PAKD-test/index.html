<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- HÀM HỖ TRỢ ---
        const parseVNCurrency = (val) => {
            if (!val) return 0;
            return Number(val.toString().replace(/\./g, '').replace(/,/g, '').replace(/\s/g, '')) || 0;
        };
        const formatCurrency = (value) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(value);
        const formatPercent = (value) => new Intl.NumberFormat('vi-VN', { style: 'percent', minimumFractionDigits: 2 }).format(value / 100);
        const formatDate = (ts) => {
            const d = new Date(ts);
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        };

        // --- STORAGE HELPERS (localStorage) ---
        const STORAGE_KEY = 'pakd_saved_records';
        const getSavedRecords = () => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        };
        const saveRecord = (record) => {
            try {
                const records = getSavedRecords();
                records.unshift(record); // mới nhất lên đầu
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                return true;
            } catch { return false; }
        };
        const deleteRecord = (id) => {
            try {
                const records = getSavedRecords().filter(r => r.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                return true;
            } catch { return false; }
        };
        const updateRecord = (id, updatedData) => {
            try {
                const records = getSavedRecords().map(r => r.id === id ? {...r, ...updatedData, updatedAt: Date.now()} : r);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
                return true;
            } catch { return false; }
        };

        // ============================================================
        // === ĐỒNG BỘ DỮ LIỆU GOOGLE SHEET (CSV EXPORT) ==============
        // ============================================================
        const SHEET_ID = '1iNyB0XTf3rqZyHcmujYuuKlXh6QXTQqr-LQ1f6IEGxU';
        const DATA_KEY = 'pakd_sheet_data';     // cache dữ liệu đã đồng bộ
        const USD_KEY = 'pakd_usd_rate';        // tỷ giá USD (lưu riêng)
        const SYNC_KEY = 'pakd_last_sync';      // thời điểm đồng bộ gần nhất

        // gid CỐ ĐỊNH trong code — không hỏi anh mỗi lần nữa
        const SHEET_GIDS = {
            inventory: '0',
            minstock: '1080747466',
            importprice: '1371908903',
            po: '2015387961'
        };

        const DEFAULT_USD = 26359;
        const getUsdRate = () => { try { const r = localStorage.getItem(USD_KEY); return r ? Number(r) : DEFAULT_USD; } catch { return DEFAULT_USD; } };
        const saveUsdRate = (v) => { try { localStorage.setItem(USD_KEY, String(v)); } catch {} };
        const getLastSync = () => { try { const r = localStorage.getItem(SYNC_KEY); return r ? Number(r) : null; } catch { return null; } };
        const saveLastSync = (v) => { try { localStorage.setItem(SYNC_KEY, String(v)); } catch {} };
        const getCachedData = () => {
            try { const r = localStorage.getItem(DATA_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
        };
        const saveCachedData = (data) => { try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch {} };

        const csvUrl = (gid) => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;

        // Parse CSV chuẩn (xử lý dấu phẩy trong ngoặc kép, xuống dòng trong ô)
        const parseCsv = (text) => {
            const rows = []; let row = [], cur = '', inQ = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i], n = text[i+1];
                if (inQ) {
                    if (c === '"' && n === '"') { cur += '"'; i++; }
                    else if (c === '"') inQ = false;
                    else cur += c;
                } else {
                    if (c === '"') inQ = true;
                    else if (c === ',') { row.push(cur); cur = ''; }
                    else if (c === '\r') {}
                    else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
                    else cur += c;
                }
            }
            if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
            return rows;
        };
        // Chuyển CSV -> mảng object theo header dòng đầu
        const csvToObjects = (text) => {
            const rows = parseCsv(text).filter(r => r.some(c => c.trim() !== ''));
            if (!rows.length) return [];
            const header = rows[0].map(h => h.trim());
            return rows.slice(1).map(r => {
                const o = {}; header.forEach((h, i) => o[h] = (r[i] ?? '').trim()); return o;
            });
        };
        const numVal = (v) => { const n = Number(String(v ?? '').replace(/[^\d.\-]/g, '')); return isNaN(n) ? 0 : n; };

        // Chuẩn hoá -> khoá tra cứu SKU: MAC|TEMPER|DAY|RONG|DAI|PHU
        const norm = (v) => String(v ?? '').trim().toUpperCase();
        // Chuẩn hoá kích thước: số nguyên/thập phân đều quy về dạng số tối giản (1, 1.0, 1.00, 01 → "1"; 2.50 → "2.5");
        // giá trị chữ (vd "C" = cuộn) giữ nguyên dạng chữ hoa. Xử lý cả dấu phẩy thập phân kiểu VN ("1,5" → "1.5").
        const normDim = (v) => {
            const s = String(v ?? '').trim();
            if (s === '') return '';
            const cleaned = s.replace(/\s/g, '').replace(',', '.');
            if (/^[0-9]*\.?[0-9]+$/.test(cleaned)) {
                const n = parseFloat(cleaned);
                if (!isNaN(n)) return String(n);   // parseFloat tự bỏ .0 thừa và số 0 đầu
            }
            return s.toUpperCase();
        };
        const normThick = (v) => normDim(v);
        const skuKey = (alloy, temper, thickness, width, length, coating) =>
            [norm(alloy), norm(temper), normDim(thickness), normDim(width), normDim(length), norm(coating)].join('|');

        // --- ICONS ---
        const IconBase = ({ d, className, color }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={{color: color}}><path d={d} /></svg>);
        const Printer = (props) => <IconBase {...props} d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z" />;
        const FileText = (props) => <IconBase {...props} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8" />;
        const Plus = (props) => <IconBase {...props} d="M12 5v14M5 12h14" />;
        const Trash = (props) => <IconBase {...props} d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />;
        const Calculator = (props) => <IconBase {...props} d="M6 3h12a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3z M16 7h-6 M8 11h.01 M12 11h.01 M16 11h.01 M8 15h.01 M12 15h.01 M16 15h.01" />;
        const AlertTriangle = (props) => <IconBase {...props} d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01" />;
        const TrendingUp = (props) => <IconBase {...props} d="M23 6l-9.5 9.5-5-5L1 18" />;
        const TrendingDown = (props) => <IconBase {...props} d="M23 18l-9.5-9.5-5 5L1 6" />;
        const CheckCircle = (props) => <IconBase {...props} d="M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4L12 14.01l-3-3" />;
        const XCircle = (props) => <IconBase {...props} d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />;
        const RefreshCcw = (props) => <IconBase {...props} d="M3 2v6h6 M21 12A9 9 0 0 0 6 5.3L3 8 M21 22v-6h-6 M3 12a9 9 0 0 0 15 6.7l3-2.7" />;
        const ShieldAlert = (props) => <IconBase {...props} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z M12 8v4 M12 16h.01" />;
        const Users = (props) => <IconBase {...props} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M16 3.13a4 4 0 0 1 0 7.75 M23 21v-2a4 4 0 0 0-3-3.87" />;
        const Award = (props) => <IconBase {...props} d="M12 15l-2 5l2 5l2-5l2-5 M12 8a6 6 0 1 0 0-12a6 6 0 0 0 0 12z" />;
        const Siren = (props) => <IconBase {...props} d="M7 18v-6a5 5 0 1 1 10 0v6 M5 21h14 M12 3v2" />;
        const Zap = (props) => <IconBase {...props} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />;
        const Layers = (props) => <IconBase {...props} d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />;
        const Swords = (props) => <IconBase {...props} d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M16 16l4 4M19 21l2-2" />;
        const Wrench = (props) => <IconBase {...props} d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />;
        const History = (props) => <IconBase {...props} d="M3 3v5h5 M3.05 13A9 9 0 1 0 6 5.3L3 8" />;
        const Save = (props) => <IconBase {...props} d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z M17 21v-8H7v8 M7 3v5h8" />;
        const FolderOpen = (props) => <IconBase {...props} d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />;
        const Edit = (props) => <IconBase {...props} d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />;
        const X = (props) => <IconBase {...props} d="M18 6L6 18M6 6l12 12" />;
        const Database = (props) => <IconBase {...props} d="M12 8c4.97 0 9-1.34 9-3s-4.03-3-9-3-9 1.34-9 3 4.03 3 9 3z M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5 M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3" />;
        const Search = (props) => <IconBase {...props} d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.35-4.35" />;
        const Truck = (props) => <IconBase {...props} d="M1 3h15v13H1z M16 8h4l3 3v5h-7V8z M5.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z M18.5 21a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z" />;
        const Lock = (props) => <IconBase {...props} d="M5 11h14v10H5z M7 11V7a5 5 0 0 1 10 0v4" />;

        const PakdManualLink = () => (
            <div className="mt-4 space-y-2 no-print">
                <a href="https://docs.google.com/document/d/1AHCpd9XuVkD0r1KS-c7etbEUnsnVzvIv6C6xN7KTKdI/edit?tab=t.0" target="_blank" rel="noopener noreferrer" className="flex items-start gap-2 px-3 py-2 rounded-md bg-slate-50 border border-slate-200 hover:bg-slate-100 hover:border-slate-300 transition text-slate-600 hover:text-slate-800">
                    <FileText className="w-4 h-4 mt-0.5 text-blue-600 flex-shrink-0" />
                    <div className="text-xs leading-snug"><div className="font-semibold">Cẩm nang logic & công thức PAKD</div><div className="italic text-slate-500">Giải thích chi tiết cách tính & ý nghĩa chỉ số</div></div>
                </a>
                <a href="https://docs.google.com/document/d/1z_vP6SU5G1M3qOKe9IVSuyoZtaytgLy_pA2GgPQYTIs/edit?tab=t.0" target="_blank" rel="noopener noreferrer" className="flex items-start gap-2 px-3 py-2 rounded-md bg-slate-50 border border-slate-200 hover:bg-slate-100 hover:border-slate-300 transition text-slate-600 hover:text-slate-800">
                    <FileText className="w-4 h-4 mt-0.5 text-emerald-600 flex-shrink-0" />
                    <div className="text-xs leading-snug"><div className="font-semibold">Bảng tra cứu nhanh: Ma trận logic quyết định</div><div className="italic text-slate-500">Hướng dẫn ra quyết định theo màu đèn & điều kiện kích hoạt</div></div>
                </a>
            </div>
        );

        // --- MẪU 1: BÁO GIÁ CHO KHÁCH HÀNG ---
        const QuotationPrint = ({ inputs, metrics, productList, printMode }) => {
            const totalRevenue = metrics.revenue;
            const vatPct = (inputs.vatRate != null ? inputs.vatRate : 10);
            const vat = totalRevenue * (vatPct / 100);
            const totalWithVAT = totalRevenue + vat;
            const dateObj = new Date(inputs.quoteDate);
            return (
                <div className={`invoice-box print-container ${printMode === 'quotation' ? 'print-mode-active' : ''}`}>
                    <div className="invoice-header">
                        <div style={{flex: 2}}>
                            <h3 style={{fontSize: '13pt', fontWeight: 'bold', textTransform: 'uppercase', color: '#003366', marginBottom: '5px'}}>CÔNG TY TNHH THÉP H&D</h3>
                            <p style={{fontSize: '9.5pt'}}>
                                <strong>VP Hà Nội:</strong> Số 46 ngõ 14 Phố Nguyễn Lân - Q. Thanh Xuân - Hà Nội<br/>
                                <strong>MST:</strong> 0101185325 | <strong>Hotline:</strong> 0913270770 / 0903262566<br/>
                                <strong>Email:</strong> info@hdsteel.com.vn
                            </p>
                        </div>
                        <div style={{flex: 1, textAlign: 'right'}}>
                            <div style={{border: '1px solid #000', padding: '5px', display: 'inline-block', textAlign: 'center'}}>
                                <strong style={{fontSize: '12pt', color: '#cc0000'}}>ISO 9001:2015</strong><br/><small style={{fontSize: '8pt'}}>JAS-ANZ | QUACERT</small>
                            </div>
                        </div>
                    </div>
                    <div style={{borderBottom: '2px solid #000', marginBottom: '10px'}}></div>
                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '11pt', fontStyle: 'italic'}}>
                        <div>Số: {new Date().getTime().toString().slice(-6)}/{new Date().getFullYear()}.01A/HD.BG</div>
                        <div>Hà Nội, ngày {dateObj.getDate()} tháng {dateObj.getMonth() + 1} năm {dateObj.getFullYear()}</div>
                    </div>
                    <div className="invoice-title">BÁO GIÁ KIÊM XÁC NHẬN ĐƠN HÀNG</div>
                    <table style={{width: '100%', marginBottom: '15px', fontSize: '11pt'}}>
                        <tbody>
                            <tr>
                                <td style={{width: '50%', verticalAlign: 'top'}}><strong>Kính gửi: {inputs.customerName.toUpperCase()}</strong><br/>Người nhận: {inputs.receiverName}<br/>Điện thoại: {inputs.receiverPhone}</td>
                                <td style={{width: '50%', verticalAlign: 'top', paddingLeft: '10px'}}><strong>Người gửi: {inputs.senderName}</strong><br/>Chức danh: {inputs.senderTitle}<br/>Di động: {inputs.senderPhone}</td>
                            </tr>
                        </tbody>
                    </table>
                    <p>Công ty TNHH Thép H&D xin trân trọng gửi tới Quý khách hàng bản báo giá:</p>
                    <table className="invoice-table">
                        <thead><tr><th>TT</th><th>Chủng loại</th><th>Kích thước</th><th>ĐVT</th><th>SL</th><th>Trọng lượng (Kg)</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
                        <tbody>
                            {productList.map((prod, index) => (
                                <tr key={prod.id}>
                                    <td>{index + 1}</td><td className="text-left">{prod.name}</td><td className="text-left">{prod.specs}</td><td>{prod.unit}</td><td>{prod.qtyUnit}</td>
                                    <td className="text-right">{new Intl.NumberFormat('vi-VN').format(prod.quantity)}</td>
                                    <td className="text-right">{new Intl.NumberFormat('vi-VN').format(prod.sellPrice)}</td>
                                    <td className="text-right">{new Intl.NumberFormat('vi-VN').format(prod.quantity * prod.sellPrice)}</td>
                                </tr>
                            ))}
                            {[...Array(Math.max(0, 5 - productList.length))].map((_, i) => <tr key={`e-${i}`}><td style={{height:'25px'}}></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>)}
                            <tr style={{fontWeight: 'bold'}}><td colSpan="7" className="text-right">Cộng tiền hàng:</td><td className="text-right">{new Intl.NumberFormat('vi-VN').format(totalRevenue)}</td></tr>
                            <tr style={{fontWeight: 'bold'}}><td colSpan="7" className="text-right">Thuế VAT ({vatPct}%):</td><td className="text-right">{new Intl.NumberFormat('vi-VN').format(vat)}</td></tr>
                            <tr style={{fontWeight: 'bold', fontSize: '12pt'}}><td colSpan="7" className="text-right">TỔNG CỘNG:</td><td className="text-right">{new Intl.NumberFormat('vi-VN').format(totalWithVAT)} VNĐ</td></tr>
                        </tbody>
                    </table>
                    <div style={{marginTop: '10px', fontStyle: 'italic'}}><strong>Bằng chữ:</strong> {inputs.amountInWords}</div>
                    <div style={{marginTop: '20px', fontSize: '11pt', lineHeight: '1.4'}}>
                        <p><strong>2. Thanh toán:</strong> {inputs.termPayment}</p>
                        <p><strong>3. Hiệu lực:</strong> {inputs.termValidity}</p>
                    </div>
                    <div className="footer-sign">
                        <div style={{width: '40%'}}><strong>XÁC NHẬN CỦA KHÁCH HÀNG</strong><br/>(Ký, ghi rõ họ tên)<br/><br/><br/></div>
                        <div style={{width: '40%'}}><strong>CÔNG TY TNHH THÉP H&D</strong><br/>(Ký tên - Đóng dấu)<br/><br/><br/><p>{inputs.senderName}</p></div>
                    </div>
                </div>
            );
        };

        // --- MẪU 2: BÁO CÁO PAKD ---
        const PAKDReportPrint = ({ inputs, metrics, productList, printMode, index }) => {
            const dateObj = new Date();
            const getColor = () => {
                if (metrics.status === 'GREEN') return '#166534';
                if (metrics.status === 'BLUE') return '#1e40af';
                if (metrics.status === 'PURPLE') return '#581c87';
                if (metrics.status.includes('YELLOW')) return '#854d0e';
                return '#991b1b';
            };
            const vat = metrics.revenue * ((inputs.vatRate || 0) / 100);
            const totalWithVat = metrics.revenue + vat;

            // Tổng hợp tình trạng hàng & cảnh báo từng dòng (dùng index nếu có)
            const idx = index || { byKey: {}, poByKey: {} };
            const rows = productList.map(p => {
                const it = p.skuKey ? idx.byKey[p.skuKey] : null;
                const poList = (it && idx.poByKey[p.skuKey]) || [];
                const reserved = poList.reduce((s, x) => s + x.remain, 0);
                const stockKg = it ? it.stockKg : null;
                const transitKg = it ? it.transitKg : 0;

                }
                const eta = it && it.transitInfo && it.transitInfo.length ? it.transitInfo.map(x=>x.eta).filter(Boolean)[0] : '';
                return { p, it, poList, reserved, stockKg, transitKg, available, supply, supplyColor, eta };
            });

        // --- MODAL: DANH SÁCH HỒ SƠ ĐÃ LƯU ---
        const SavedRecordsModal = ({ onClose, onLoad, currentInputs, currentProducts, currentMetrics }) => {
